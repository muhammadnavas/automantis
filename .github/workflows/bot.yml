name: Daily Mantis Bot

on:
  schedule:
    - cron: '30 2 * * *' # 08:00 AM IST (UTC+5:30)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore streak state
        uses: actions/cache/restore@v4
        with:
          path: streaks.json
          key: streaks-${{ github.run_id }}
          restore-keys: |
            streaks-

      - name: Ensure streak state file exists
        run: |
          if [ ! -f streaks.json ]; then
            echo '{"last_update_id": 0, "polls": {}, "users": {}}' > streaks.json
          fi

      - run: python -m pip install -r requirements.txt

      - name: Build question database from PDFs
        run: python extract_questions_from_pdfs.py

      - name: Curate question database format
        run: python curate_questions.py

      - run: python mantis.py

      - name: Save streak state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: streaks.json
          key: streaks-${{ github.run_id }}